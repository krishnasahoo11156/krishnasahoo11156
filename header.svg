<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <style>
      /* ── Typewriter ── */
      @keyframes typewriter {
        from { clip-path: inset(0 100% 0 0); }
        to   { clip-path: inset(0 0%   0 0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0; }
      }

      /* ── Shimmer sweep on name ── */
      @keyframes shimmer {
        0%   { stop-color: #7f5af0; }
        30%  { stop-color: #00b4d8; }
        60%  { stop-color: #ffffff; }
        100% { stop-color: #7f5af0; }
      }
      @keyframes shimmerMove {
        0%   { x1: -200%; x2: -100%; }
        100% { x1: 200%;  x2: 300%;  }
      }

      /* ── Floating particles ── */
      @keyframes floatA {
        0%   { transform: translateY(0px)   scale(1);   opacity: 0.7; }
        50%  { transform: translateY(-30px) scale(1.2); opacity: 1;   }
        100% { transform: translateY(0px)   scale(1);   opacity: 0.7; }
      }
      @keyframes floatB {
        0%   { transform: translateY(0px)   scale(1);   opacity: 0.4; }
        50%  { transform: translateY(-20px) scale(0.8); opacity: 0.9; }
        100% { transform: translateY(0px)   scale(1);   opacity: 0.4; }
      }
      @keyframes floatC {
        0%   { transform: translateY(0px)   rotate(0deg)   opacity: 0.5; }
        50%  { transform: translateY(-40px) rotate(180deg) opacity: 1;   }
        100% { transform: translateY(0px)   rotate(360deg) opacity: 0.5; }
      }
      @keyframes pulse {
        0%   { r: 4;  opacity: 0.8; }
        50%  { r: 8;  opacity: 0.3; }
        100% { r: 4;  opacity: 0.8; }
      }
      @keyframes orbitX {
        0%   { transform: translateX(-60px); opacity: 0.2; }
        50%  { transform: translateX(60px);  opacity: 0.9; }
        100% { transform: translateX(-60px); opacity: 0.2; }
      }

      /* ── Subtitle fade + slide ── */
      @keyframes fadeSlideUp {
        0%   { opacity: 0; transform: translateY(16px); }
        100% { opacity: 1; transform: translateY(0px);  }
      }

      /* ── Glow ring ── */
      @keyframes glowRing {
        0%   { stroke-opacity: 0.2; stroke-width: 1; }
        50%  { stroke-opacity: 0.8; stroke-width: 3; }
        100% { stroke-opacity: 0.2; stroke-width: 1; }
      }

      .particle-a { animation: floatA 4s ease-in-out infinite; }
      .particle-b { animation: floatB 5s ease-in-out infinite 1s; }
      .particle-c { animation: floatB 3.5s ease-in-out infinite 0.5s; }
      .particle-d { animation: floatA 6s ease-in-out infinite 2s; }
      .particle-e { animation: floatB 4.5s ease-in-out infinite 1.5s; }
      .pulse-dot   { animation: pulse  2.5s ease-in-out infinite; }
      .orbit-dot   { animation: orbitX 3s  ease-in-out infinite; }
      .glow-ring   { animation: glowRing 3s ease-in-out infinite; }
      .subtitle    { animation: fadeSlideUp 1s ease-out 2.8s both; }
      .tag-line    { animation: fadeSlideUp 1s ease-out 3.4s both; }
    </style>

    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="50%"  stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Shimmer gradient for name text (animates via animateTransform) -->
    <linearGradient id="shimmerGrad" x1="-200%" y1="0%" x2="-100%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7f5af0">
        <animate attributeName="stop-color" values="#7f5af0;#00b4d8;#ffffff;#7f5af0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%"  stop-color="#00b4d8">
        <animate attributeName="stop-color" values="#00b4d8;#ffffff;#7f5af0;#00b4d8" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#7f5af0;#00b4d8;#ffffff" dur="3s" repeatCount="indefinite"/>
      </stop>
      <animateTransform attributeName="gradientTransform" type="translate" from="-900 0" to="900 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)" rx="16"/>

  <!-- Top border glow line -->
  <rect x="0" y="0" width="900" height="3" rx="2" fill="url(#shimmerGrad)" opacity="0.9"/>

  <!-- ── Floating background particles ── -->
  <!-- Orbit rings -->
  <circle cx="80"  cy="60"  r="28" fill="none" stroke="#7f5af0" stroke-width="1" class="glow-ring"/>
  <circle cx="820" cy="200" r="20" fill="none" stroke="#00b4d8" stroke-width="1" class="glow-ring"/>
  <circle cx="750" cy="55"  r="35" fill="none" stroke="#7f5af0" stroke-width="0.5" opacity="0.5">
    <animate attributeName="r" values="35;42;35" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating dots -->
  <circle cx="60"  cy="40"  r="4" fill="#7f5af0" filter="url(#glow)" class="particle-a"/>
  <circle cx="100" cy="90"  r="3" fill="#00b4d8" filter="url(#glow)" class="particle-b"/>
  <circle cx="840" cy="35"  r="5" fill="#7f5af0" filter="url(#glow)" class="particle-c"/>
  <circle cx="800" cy="80"  r="3" fill="#00b4d8" filter="url(#glow)" class="particle-a"/>
  <circle cx="860" cy="180" r="4" fill="#7f5af0" filter="url(#glow)" class="particle-d"/>
  <circle cx="35"  cy="170" r="3" fill="#00b4d8" filter="url(#glow)" class="particle-e"/>
  <circle cx="150" cy="220" r="2" fill="#ffffff" opacity="0.4" class="particle-b"/>
  <circle cx="760" cy="230" r="2" fill="#ffffff" opacity="0.4" class="particle-c"/>
  <circle cx="450" cy="260" r="2" fill="#00b4d8" opacity="0.3" class="particle-a"/>

  <!-- Small stars -->
  <circle cx="200" cy="30"  r="1.5" fill="#ffffff" opacity="0.5" class="pulse-dot"/>
  <circle cx="680" cy="25"  r="1.5" fill="#ffffff" opacity="0.5" class="pulse-dot"/>
  <circle cx="120" cy="140" r="1"   fill="#00b4d8" opacity="0.6" class="pulse-dot"/>
  <circle cx="790" cy="140" r="1"   fill="#7f5af0" opacity="0.6" class="pulse-dot"/>
  <circle cx="880" cy="100" r="1.5" fill="#ffffff" opacity="0.4" class="pulse-dot"/>
  <circle cx="20"  cy="110" r="1.5" fill="#ffffff" opacity="0.4" class="pulse-dot"/>

  <!-- ── Name with shimmer gradient fill ── -->
  <text
    x="450" y="120"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="58"
    font-weight="900"
    letter-spacing="3"
    fill="url(#shimmerGrad)"
    filter="url(#softGlow)"
    style="clip-path: inset(0 0% 0 0); animation: typewriter 2.4s steps(14,end) 0.2s both;"
  >Krishna Sahoo</text>

  <!-- Cursor after name -->
  <rect x="660" y="84" width="4" height="46" fill="#00b4d8" rx="2"
    style="animation: blink 1s step-end 2.6s infinite;">
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="2.6s" repeatCount="indefinite"/>
  </rect>

  <!-- ── Subtitle ── -->
  <text
    x="450" y="162"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="17"
    fill="#00b4d8"
    letter-spacing="5"
    class="subtitle"
  >B.TECH · AI &amp; DATA SCIENCE · 1ST YEAR</text>

  <!-- ── Tag line ── -->
  <text
    x="450" y="198"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="14"
    fill="#a8b2d8"
    font-style="italic"
    class="tag-line"
  >Building things. Breaking things. Learning fast.</text>

  <!-- ── Animated divider line ── -->
  <line x1="220" y1="215" x2="680" y2="215" stroke="#7f5af0" stroke-width="1" opacity="0.4">
    <animate attributeName="x1" values="450;220;450" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="450;680;450" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="3s" repeatCount="indefinite"/>
  </line>
  <circle cx="450" cy="215" r="4" fill="#00b4d8" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Role tags ── -->
  <g class="tag-line">
    <!-- Tag 1 -->
    <rect x="248" y="230" width="100" height="24" rx="12" fill="#7f5af020" stroke="#7f5af0" stroke-width="1"/>
    <text x="298" y="246" text-anchor="middle" font-family="monospace" font-size="11" fill="#7f5af0">Java + DSA</text>
    <!-- Tag 2 -->
    <rect x="360" y="230" width="90" height="24" rx="12" fill="#00b4d820" stroke="#00b4d8" stroke-width="1"/>
    <text x="405" y="246" text-anchor="middle" font-family="monospace" font-size="11" fill="#00b4d8">Web Dev</text>
    <!-- Tag 3 -->
    <rect x="462" y="230" width="105" height="24" rx="12" fill="#7f5af020" stroke="#7f5af0" stroke-width="1"/>
    <text x="514" y="246" text-anchor="middle" font-family="monospace" font-size="11" fill="#7f5af0">ML Explorer</text>
  </g>

  <!-- Bottom border -->
  <rect x="0" y="277" width="900" height="3" rx="2" fill="url(#shimmerGrad)" opacity="0.6"/>
</svg>
