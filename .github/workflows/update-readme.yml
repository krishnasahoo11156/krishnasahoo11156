name: Update README

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://krishna-portfolio-lake-psi.vercel.app/rss.xml"
          max_post_count: 3
          comment_tag_name: "BLOG-POST-LIST"
